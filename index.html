<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeforeGo Legal</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #12313a;
      --muted: #607879;
      --moss: #1f9b8a;
      --paper: #edf7f5;
      --line: #d0e3df;
    }

    body {
      margin: 0;
      font: 17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--paper), #fff);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 8vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      margin: 0 0 28px;
    }

    a {
      display: block;
      margin: 12px 0;
      padding: 18px 20px;
      color: var(--ink);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    a strong {
      display: block;
      font-size: 20px;
    }

    a span {
      color: var(--moss);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>BeforeGo Legal</h1>
    <p>Privacy and terms for BeforeGo.</p>

    <a href="./privacy-policy/">
      <strong>Privacy Policy</strong>
      <span>How BeforeGo handles app data and permissions</span>
    </a>

    <a href="./terms-of-use/">
      <strong>Terms of Use</strong>
      <span>Rules for using BeforeGo and BeforeGo VIP</span>
    </a>
  </main>
</body>
</html>
